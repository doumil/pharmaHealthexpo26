name: pharma_health_expo
description: "Pharma Health Expo 2026 Flutter Project."
publish_to: 'none'
version: 1.0.0+23

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: any
  intl: any
  font_awesome_flutter:
    git:
      url: https://github.com/fluttercommunity/font_awesome_flutter.git
      ref: master
  carousel_slider: any
  flutter_staggered_grid_view: any
  webview_flutter: any
  webview_flutter_android: any
  webview_flutter_wkwebview: any
  badges: any
  app_badge_plus: any
  permission_handler: any
  flutter_carousel_slider: any
  flutter_svg: any
  flutter_easyloading: any
  http: any
  flutter_native_splash: any
  shared_preferences: any
  animate_do: any
  csv: any
  googleapis_auth: any
  flutter_animate: any
  mobile_scanner: ^7.1.3
  fluttertoast: any
  timezone: any
  connectivity_plus: any
  rxdart: any
  get: any
  file_picker: any
  url_launcher: any
  sqflite: any
  google_maps_flutter: any
  geocoding: any
  cached_network_image: any
  provider: any
  equatable: any
  flutter_launcher_icons: any
  path_provider: any
  add_2_calendar: any
  googleapis: any
  animated_splash_screen: any

flutter_native_splash:
  image: "assets/PHARMA-HEALTH-EXPO-LOGO.png"
  android_gravity: center

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/pharmaIcon.png"
  min_sdk_android: 21

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: any
  material_color_utilities: any
  meta: any
  permission_handler_android: any
  test_api: any
  change_app_package_name: ^1.1.0

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/icons/

# 🛠️ التعديل السحري: فرض النسخة المستقرة كلياً من الخرائط
dependency_overrides:
  google_maps_flutter_android: 2.14.3